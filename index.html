<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Website SMK Asajaya</title>
    <style>
        /* Memastikan tiada ruang kosong langsung di sekeliling halaman */
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            overflow: hidden !important;
            background-color: #ffffff;
        }
        
        /* Memaksa iframe memenuhi 100% lebar dan tinggi skrin peranti */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            margin: 0 !important;
            padding: 0 !important;
        }
    </style>
</head>
<body>
    <iframe src="https://script.google.com/macros/s/AKfycybwyLpIgO50iWSzNMo3EUMc9G67GWvej0YzHTFAYspCyIG1g4g/exec"></iframe>
</body>
</html>
